<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ใบกิจกรรมที่ 2.4 ตรรกศาสตร์และขั้นตอนวิธี</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --bg-color: #f5f7fa;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        h1, h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
        }

        /* Student Info Form Style */
        .student-info {
            background: #eef2f7;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #dcdde1;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: bold;
            margin-bottom: 5px;
            color: #34495e;
        }

        .student-info input, .student-info select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        /* Quiz Style */
        .section {
            margin-bottom: 35px;
            padding: 20px;
            border-left: 5px solid var(--primary-color);
            background: #fafafa;
            border-radius: 0 8px 8px 0;
        }

        ol li {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .text-center {
            text-align: center;
        }

        /* Input For Answers */
        .quiz-input {
            padding: 6px 10px;
            border: 2px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            width: 130px;
            transition: all 0.3s;
            text-align: center;
        }

        .quiz-input:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .btn-container {
            text-align: center;
            margin-top: 30px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #357abd;
        }
    </style>
</head>
<body>

<div class="container">
   
    <h1>ใบกิจกรรมที่ 2.4 ตรรกศาสตร์และขั้นตอนวิธี</h1>
    <p class="subtitle">กรอกข้อมูลส่วนตัวให้ครบถ้วนก่อนเริ่มทำกิจกรรม (คะแนนเต็ม 5 คะแนน)</p>

    <div class="student-info">
        <div class="form-grid">
            <div class="form-group">
                <label>เลขประจำตัวนักเรียน</label>
                <input type="text" id="student_id" maxlength="5" placeholder="เช่น 12345" required>
            </div>
            <div class="form-group">
                <label>คำนำหน้าชื่อ</label>
                <select id="title" required>
                    <option value="">-- เลือก --</option>
                    <option value="นาย">นาย</option>
                    <option value="นางสาว">นางสาว</option>
                </select>
            </div>
            <div class="form-group" style="grid-column: span 2;">
                <label>ชื่อ-นามสกุล</label>
                <input type="text" id="fullname" placeholder="สมชาย ใจดี" required>
            </div>
            <div class="form-group">
                <label>ตอน</label>
                <select id="section_group" required>
                    <option value="">-- เลือก --</option>
                    <option value="ก">ก</option>
                    <option value="ข">ข</option>
                </select>
            </div>
            <div class="form-group">
                <label>ห้อง</label>
                <input type="text" id="room" placeholder="เช่น 1" required>
            </div>
            <div class="form-group">
                <label>เลขที่</label>
                <input type="number" id="no" min="1" placeholder="เช่น 1" required>
            </div>
        </div>
    </div>

    <div id="quiz-container"></div>

    <div class="btn-container">
        <button onclick="submitQuiz()">ส่งคำตอบและเช็คคะแนนรวม</button>
    </div>
</div>

    let selectedSet = 1; 

    function generateQuiz() {
        selectedSet = Math.floor(Math.random() * 5) + 1;
        const set = quizDatabase[selectedSet];
        let quizHTML = '';

        // ตอนที่ 1
        quizHTML += `
        <div class="section">
            <h3>ตอนที่ 1: เติมคำในช่องว่าง (ทฤษฎีและสัญลักษณ์)</h3>
            <p style="font-style: italic; color: #666;">คำชี้แจง: นำตัวเลือกที่กำหนดให้เติมลงในช่องว่างให้ถูกต้อง (ตัวเลือก: <b>&&, ||, !, True, False, ==, !=, &gt;, &lt;, &gt;=, &lt;=</b>)</p>
            <ol>`;
        set.part1.forEach((item, index) => {
            const qNum = index + 1;
            quizHTML += `
                <li>${item.q} 
                    <input type="text" id="q${qNum}" class="quiz-input" data-answer="${item.a}">
                </li>`;
        });
        quizHTML += `</ol></div>`;

        // ตอนที่ 2
        quizHTML += `
        <div class="section">
            <h3>ตอนที่ 2: หาผลลัพธ์สุดท้ายของนิพจน์</h3>
            <p style="font-style: italic; color: #666;">คำชี้แจง: จงคำนวณและเติมผลลัพธ์สุดท้ายว่าเป็น <b>True</b> หรือ <b>False</b></p>
            <table>
                <thead>
                    <tr>
                        <th width="10%" class="text-center">ข้อที่</th>
                        <th width="50%">นิพจน์ตรรกศาสตร์</th>
                        <th width="40%" class="text-center">กรอกคำตอบ (True / False)</th>
                    </tr>
                </thead>
                <tbody>`;
        set.part2.forEach((item, index) => {
            const qNum = index + 6;
            quizHTML += `
                <tr>
                    <td class="text-center">${index + 1}</td>
                    <td><code>${item.exp}</code></td>
                    <td class="text-center">
                        <input type="text" id="q${qNum}" class="quiz-input" data-answer="${item.a}">
                    </td>
                </tr>`;
        });
        quizHTML += `</tbody></table></div>`;

        // ตอนที่ 3
        quizHTML += `
        <div class="section">
            <h3>ตอนที่ 3: ขั้นตอนวิธีแบบบรรยาย (แบบทางเลือก และ แบบทำซ้ำ)</h3>
            <p style="font-style: italic; color: #666;">คำชี้แจง: วิเคราะห์ขั้นตอนวิธีแบบบรรยายต่อไปนี้ แล้วตอบว่าพิมพ์ผลลัพธ์สุดท้ายเป็นตัวเลขอะไร หรือเงื่อนไขเป็น True หรือ False</p>
            <ol>`;
        set.part3.forEach((item, index) => {
            const qNum = index + 11;
            quizHTML += `
                <li>
                    ${item.text}<br>
                    <input type="text" id="q${qNum}" class="quiz-input" placeholder="${item.p}" data-answer="${item.a}">
                </li>`;
        });
        quizHTML += `</ol></div>`;

        document.getElementById('quiz-container').innerHTML = quizHTML;
    }

    function submitQuiz() {
        const studentId = document.getElementById('student_id').value.trim();
        const title = document.getElementById('title').value;
        const fullname = document.getElementById('fullname').value.trim();
        const sectionGroup = document.getElementById('section_group').value;
        const room = document.getElementById('room').value.trim();
        const no = document.getElementById('no').value.trim();

        if (!studentId || studentId.length !== 5 || !title || !fullname || !sectionGroup || !room || !no) {
            alert("⚠️ กรุณากรอกข้อมูลนักเรียนให้ครบถ้วน และเลขประจำตัวต้องมี 5 หลักครับ!");
            return;
        }

        let totalScore = 0;
        let answeredCount = 0;

        for (let i = 1; i <= totalQuestions; i++) {
            const inputField = document.getElementById('q' + i);
            if(inputField) {
                const userAnswer = inputField.value.trim().toLowerCase();
                const correctAnswer = inputField.getAttribute('data-answer').toLowerCase();

                if (userAnswer !== "") {
                    answeredCount++;
                    if (userAnswer === correctAnswer) {
                        totalScore++;
                    }
                }
            }
        }

        if (answeredCount < totalQuestions) {
            alert(`⚠️ กรุณาตอบคำถามให้ครบทั้ง ${totalQuestions} ข้อก่อนกดส่งครับ!`);
            return;
        }

        // [แก้ไขคำนวณ] แปลงจากคะแนนดิบ 15 ข้อ ให้ทอนเป็นเต็ม 5 คะแนนโดยการหาร 3 ปัดเศษทศนิยม 2 ตำแหน่ง
        const finalScore5 = Number((totalScore / 3).toFixed(2));

        const submitBtn = document.querySelector('.btn-container button');
        submitBtn.innerText = "กำลังบันทึกข้อมูล...";
        submitBtn.disabled = true;

        const payload = {
            student_id: studentId,
            title: title,
            fullname: fullname,
            section_group: sectionGroup,
            room: room,
            no: no,
            score: finalScore5, // ส่งคะแนนสุทธิ (เต็ม 5) ไปเก็บที่ชีต
            quiz_set: selectedSet
        };

        fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors", 
            cache: "no-cache",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert(`🎉 บันทึกข้อมูลลง Google Sheet สำเร็จ!\n\nผู้ส่ง: ${title}${fullname}\nทำถูกทั้งหมด: ${totalScore} จาก 15 ข้อดิบ\nคิดเป็นคะแนนสุทธิสุทธิ์: ${finalScore5} / 5 คะแนน`);
            
            submitBtn.innerText = "ส่งคำตอบและเช็คคะแนนรวม";
            submitBtn.disabled = false;
        })
        .catch(error => {
            alert("เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล กรุณาลองใหม่อีกครั้ง");
            console.error("Error:", error);
            submitBtn.innerText = "ส่งคำตอบและเช็คคะแนนรวม";
            submitBtn.disabled = false;
        });
    }

    window.onload = generateQuiz;
</script>
